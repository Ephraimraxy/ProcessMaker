apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-app
  labels:
    app: processmaker
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processmaker
      component: web
  template:
    metadata:
      labels:
        app: processmaker
        component: web
    spec:
      containers:
      - name: app
        image: your-docker-registry/processmaker-app:latest
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: pm-config
        - secretRef:
            name: pm-secrets
        volumeMounts:
        - name: storage
          mountPath: /var/www/html/storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: pm-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pm-app-service
spec:
  selector:
    app: processmaker
    component: web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 9000
  type: ClusterIP
