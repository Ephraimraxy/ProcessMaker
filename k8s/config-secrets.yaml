apiVersion: v1
kind: ConfigMap
metadata:
  name: pm-config
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://your-domain.com"
  DB_CONNECTION: "mysql"
  DB_HOST: "your-rds-endpoint"
  DB_PORT: "3306"
  DB_DATABASE: "processmaker"
  REDIS_HOST: "your-redis-endpoint"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: pm-secrets
type: Opaque
data:
  # Values must be base64 encoded
  APP_KEY: "" # base64 string
  DB_USERNAME: "cHJvY2Vzc21ha2Vy" # processmaker
  DB_PASSWORD: "" # base64 string
  REDIS_PASSWORD: "" # base64 string
