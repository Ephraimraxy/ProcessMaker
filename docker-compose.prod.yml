version: '3.8'

services:
  # Traefik Reverse Proxy (Handles SSL automatically)
  traefik:
    image: traefik:v2.10
    container_name: pm_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./docker/traefik/acme.json:/letsencrypt/acme.json"
    networks:
      - pm_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: pm_nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pm.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.pm.entrypoints=websecure"
      - "traefik.http.routers.pm.tls.certresolver=myresolver"
      - "traefik.http.routers.pm-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.pm-http.entrypoints=web"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.pm-http.middlewares=https-redirect"
    networks:
      - pm_network

  # ProcessMaker App (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://${APP_DOMAIN}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-processmaker}
      - DB_USERNAME=${DB_USERNAME:-processmaker}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - pm_network

  # Queue Worker
  horizon:
    image: processmaker/processmaker-app:latest # Will use the image built by 'app' service
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-processmaker}
      - DB_USERNAME=${DB_USERNAME:-processmaker}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - app
      - db
      - redis
    networks:
      - pm_network

  # Real-time Notifications
  echo:
    image: oanhnn/laravel-echo-server:latest
    container_name: pm_echo
    restart: unless-stopped
    environment:
      - LARAVEL_ECHO_SERVER_AUTH_HOST=http://nginx
      - LARAVEL_ECHO_SERVER_DEBUG=false
      - LARAVEL_ECHO_SERVER_DB=redis
      - LARAVEL_ECHO_SERVER_REDIS_HOST=redis
      - LARAVEL_ECHO_SERVER_REDIS_PASSWORD=${REDIS_PASSWORD}
      - LARAVEL_ECHO_SERVER_PROTO=http
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echo.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.echo.entrypoints=websecure"
      - "traefik.http.routers.echo.tls.certresolver=myresolver"
      - "traefik.http.services.echo.loadbalancer.server.port=6001"
    networks:
      - pm_network

  # Database
  db:
    image: mysql:8.0
    container_name: pm_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-processmaker}
      - MYSQL_USER=${DB_USERNAME:-processmaker}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pm_network

  # Cache & Queues
  redis:
    image: redis:7-alpine
    container_name: pm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - pm_network

volumes:
  db_data:
  redis_data:

networks:
  pm_network:
    driver: bridge
