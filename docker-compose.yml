version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: pm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pm_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-processmaker}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - pm_network

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-processmaker}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - app
      - db
      - redis
    networks:
      - pm_network

  db:
    image: mysql:8.0
    container_name: pm_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-processmaker}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - MYSQL_USER=${DB_USERNAME:-root}
      - MYSQL_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - pm_network

  redis:
    image: redis:7-alpine
    container_name: pm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pm_network

volumes:
  db_data:

networks:
  pm_network:
    driver: bridge




